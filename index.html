<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>The Creative Co. Yönetim Paneli</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;--card:#fff;--sb:#1e293b;--sb2:#0f172a;
  --acc:#3b82f6;--acc2:#60a5fa;
  --txt:#1e293b;--txt2:#475569;--txt3:#94a3b8;
  --bdr:#f1f5f9;--bdr2:#e2e8f0;
  --grn:#10b981;--grn-bg:#ecfdf5;
  --red:#ef4444;--red-bg:#fef2f2;--red-l:#fee2e2;
  --amb:#f59e0b;--amb-bg:#fffbeb;
  --pur:#7c3aed;--pur-bg:#ede9fe;
  --blu:#0284c7;--blu-bg:#e0f2fe;
  --sh:0 2px 14px rgba(0,0,0,.07);
  --fn:'DM Sans',system-ui,sans-serif;
  --sb-width: 250px;
}
html,body{height:100%;font-family:var(--fn);background:var(--bg);color:var(--txt)}

/* ─── APP SHELL ─── */
.app{display:flex;height:100vh;overflow:hidden}

/* ═══════ SIDEBAR ═══════ */
.sb{
  width:var(--sb-width);flex-shrink:0;
  background:linear-gradient(180deg,var(--sb),var(--sb2));
  color:#fff;display:flex;flex-direction:column;
  box-shadow:2px 0 12px rgba(0,0,0,.12);
  position:relative;z-index:20;transition:transform .3s ease;
}
.sb-logo{
  padding:24px 20px 20px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:12px;
}
.sb-logo-icon{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#60a5fa);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(37,99,235,.35);
}
.sb-logo-txt strong{font-size:18px;font-weight:800;letter-spacing:-.4px;display:block}
.sb-logo-txt em{font-size:10px;color:rgba(255,255,255,.4);font-style:normal;font-weight:500}
.sb-nav{flex:1;padding:14px 12px;overflow-y:auto}

.nav-item{
  width:100%;display:flex;align-items:center;gap:11px;
  padding:11px 14px;border-radius:10px;border:none;
  background:transparent;color:rgba(255,255,255,.52);
  font:500 14px/1 var(--fn);cursor:pointer;
  transition:all .18s;margin-bottom:3px;position:relative;
  text-align:left;text-decoration:none;
}
.nav-item:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.88)}
.nav-item.active{background:rgba(59,130,246,.2);color:var(--acc2);font-weight:700}
.nav-item.active::after{
  content:'';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:7px;height:7px;border-radius:50%;background:var(--acc2);
}
.nav-item svg{flex-shrink:0;width:19px;height:19px}

/* Submenu */
.submenu{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding-left:20px}
.nav-item.has-sub.open + .submenu { max-height:200px }
.nav-item.has-sub::before{
  content:'';position:absolute;right:14px;top:50%;transform:translateY(-50%) rotate(0deg);
  width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;
  border-top:5px solid rgba(255,255,255,.52);transition:transform .2s;
}
.nav-item.has-sub.open::before{transform:translateY(-50%) rotate(180deg)}

.sb-footer{
  padding:16px 20px;
  border-top:1px solid rgba(255,255,255,.07);
  font-size:11px;color:rgba(255,255,255,.25);
  display:flex;justify-content:space-between;align-items:center;
}
.sb-status{display:flex;align-items:center;gap:6px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--grn)}
.status-dot.offline{background:#94a3b8}
.status-dot.connecting{background:var(--amb);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ═══════ MAIN ═══════ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
.hdr{
  background:var(--card);padding:12px 20px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bdr);flex-shrink:0;
  box-shadow:0 1px 4px rgba(0,0,0,.04);
}
.hdr-left{display:flex;align-items:center;gap:15px}
.menu-btn{display:none;background:none;border:none;cursor:pointer;color:var(--txt)}
.hdr-search{display:flex;align-items:center;gap:8px;background:#f8fafc;border-radius:10px;padding:9px 15px}
.hdr-search input{border:none;outline:none;background:transparent;font:400 14px var(--fn);color:var(--txt2);width:180px}
.hdr-right{display:flex;align-items:center;gap:14px}
.hdr-greet{font-size:13px;color:var(--txt3)}

/* Avatar Güncellemeleri */
.hdr-avatar { width: 38px; height: 38px; border-radius: 10px; font-size: 15px; font-weight:800; overflow: hidden; position: relative; background:linear-gradient(135deg,#2563eb,#60a5fa); color:#fff; display:flex; align-items:center; justify-content:center; }
.hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }
.prof-avatar-wrap { position: relative; width: 85px; height: 85px; margin: 0 auto 15px; cursor: pointer; transition: transform 0.2s; }
.prof-avatar-wrap:hover { transform: scale(1.05); }
.prof-avatar { width: 100%; height: 100%; border-radius: 22px; background: linear-gradient(135deg,#2563eb,#60a5fa); color:#fff; display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:800; overflow:hidden; box-shadow: 0 8px 20px rgba(37,99,235,0.25); }
.prof-avatar img { width: 100%; height: 100%; object-fit: cover; }
.prof-cam-icon { position: absolute; bottom: -4px; right: -4px; background: #fff; border-radius: 50%; padding: 6px; box-shadow: 0 3px 8px rgba(0,0,0,0.15); font-size: 14px; line-height: 1; color: var(--txt2); border: 1px solid var(--bdr); }

.content{flex:1;overflow-y:auto;padding:26px 28px;position:relative}

/* ─── PAGES & UI ─── */
.pg{display:none;animation:fadeUp .28s ease}.pg.on{display:block}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.ph h2{font-size:21px;font-weight:800;color:var(--txt)}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  border:none;border-radius:10px;padding:9px 18px;
  font:600 14px var(--fn);cursor:pointer;
  transition:transform .12s,box-shadow .12s;white-space:nowrap;
}
.btn:active{transform:scale(.96)}
.btn-p{background:linear-gradient(135deg,#1e40af,var(--acc));color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.btn-g{background:#f1f5f9;color:var(--txt2)}.btn-g:hover{background:var(--bdr2)}
.btn-d{background:var(--red-l);color:var(--red)}.btn-d:hover{background:#fecaca}
.btn-e{background:#eef2ff;color:#4f46e5}.btn-e:hover{background:#e0e7ff}
.btn-sm{padding:5px 9px;font-size:12px;border-radius:8px}

.card{background:var(--card);border-radius:14px;box-shadow:var(--sh);border:1px solid var(--bdr)}
.card-p{padding:22px}
.badge{display:inline-block;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.b-upcoming{background:var(--blu-bg);color:var(--blu)}
.b-done,.b-completed,.b-active,.b-signed{background:var(--grn-bg);color:var(--grn)}
.b-inprogress,.b-pending{background:var(--amb-bg);color:var(--amb)}
.b-todo{background:var(--pur-bg);color:var(--pur)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:14px;margin-bottom:22px}
.stat{padding:18px 19px;display:flex;align-items:center;gap:15px;cursor:default;}
.stat.clickable { cursor:pointer; transition:transform 0.1s; }
.stat.clickable:active { transform:scale(0.98); }

.stat-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-lbl{font-size:11px;color:var(--txt3);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:21px;font-weight:800;margin-top:2px}

.tbl-wrap{border-radius:14px;border:1px solid var(--bdr);box-shadow:var(--sh);overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--card)}
thead tr{background:#f8fafc}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:12px 14px;font-size:13px;color:var(--txt2);border-bottom:1px solid #fafafa;white-space:nowrap}
tr:last-child td{border-bottom:none}

.cl-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:15px}
.cl-card{padding:19px}
.cl-head{display:flex;justify-content:space-between;align-items:flex-start}
.cl-ava{width:43px;height:43px;border-radius:12px;background:linear-gradient(135deg,#dbeafe,#bfdbfe);display:flex;align-items:center;justify-content:center}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:15px}
.kb-col{background:#f8fafc;border-radius:14px;padding:15px;border:1px solid var(--bdr)}
.kb-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.kb-cards{display:flex;flex-direction:column;gap:9px}
.kb-card{background:var(--card);border-radius:11px;padding:13px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid var(--bdr)}

/* TRASH CHECKBOX */
.trash-check { width:18px; height:18px; cursor:pointer; accent-color: var(--red); }

/* MOBILE */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:15;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.active{opacity:1;pointer-events:all}
@media (max-width: 768px) {
  .app{flex-direction:column}
  .sb{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  .sb.active{transform:translateX(0)}
  .menu-btn{display:block}
  .content{padding:15px}
  .hdr-search{display:none}
}

/* MODAL & TOAST */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.38);backdrop-filter:blur(5px);z-index:999;display:none;align-items:center;justify-content:center}
.mo.on{display:flex}
.mo-box{background:#fff;border-radius:16px;width:90%;max-width:470px;max-height:90vh;overflow-y:auto;padding:30px;box-shadow:0 30px 70px rgba(0,0,0,.2)}
.mo-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.mo-cls{border:none;background:#f1f5f9;border-radius:8px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 13px;border:1.5px solid var(--bdr2);border-radius:10px;font:400 14px var(--fn);background:#fafafa;color:var(--txt);outline:none;transition:border .2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--acc);background:#fff}
.fg textarea{resize:vertical;min-height:80px}
.fr{display:flex;gap:11px}.fr .fg{flex:1}
.f-sub{width:100%;padding:11px;margin-top:6px;font-size:15px}
.section-title { font-size:12px; font-weight:700; color:var(--acc); text-transform:uppercase; margin-bottom:10px; padding-bottom:5px; border-bottom:1px solid #f1f5f9; margin-top:15px; }

/* Detail View Styles */
.det-row { display:flex; margin-bottom:12px; border-bottom:1px solid #f1f5f9; padding-bottom:8px; }
.det-lbl { width:120px; font-weight:600; color:var(--txt3); font-size:13px; }
.det-val { flex:1; font-weight:500; color:var(--txt); font-size:14px; }
.click-row { cursor:pointer; transition:background .15s; }
.click-row:hover { background: #f8fafc; }

/* PRINT STYLES (A4) */
@media print {
  @page { margin: 0; size: A4; }
  body * { visibility: hidden; }
  .print-area, .print-area * { visibility: visible; }
  .print-area {
    position: absolute; left: 0; top: 0; width: 100%; height: 100%;
    background: white; color: black; padding: 40px; z-index: 9999;
  }
  .print-btn-group { display: none !important; }
}
.print-paper {
  display:none; 
  background: #fff; padding: 40px; color: #000; font-family: 'Times New Roman', serif;
}
.print-paper.active { display:block; }
.print-header { text-align:center; border-bottom: 2px solid #000; padding-bottom: 20px; margin-bottom: 30px; }
.print-logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
.print-sub { font-size: 14px; margin-top: 5px; color: #555; }
.print-row { display:flex; justify-content: space-between; margin-bottom: 15px; }
.print-label { font-weight: bold; width: 150px; }
.print-val { flex: 1; border-bottom: 1px dotted #999; }
.print-box { border: 1px solid #000; padding: 15px; margin: 20px 0; }
.print-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; text-decoration: underline; }
.print-signatures { display: flex; justify-content: space-between; margin-top: 80px; }
.sig-box { width: 40%; text-align: center; border-top: 1px solid #000; padding-top: 10px; }

.toast{position:fixed;bottom:24px;right:24px;z-index:1001;background:var(--txt);color:#fff;padding:12px 20px;border-radius:12px;font:500 14px var(--fn);opacity:0;transform:translateY(12px);transition:all .3s;pointer-events:none;max-width:320px}
.toast.on{opacity:1;transform:translateY(0)}
.toast.success{background:var(--grn)}
.toast.error{background:var(--red)}

/* LOGIN SCREEN */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,var(--sb),var(--sb2));z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border-radius:20px;padding:40px;width:90%;max-width:400px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#2563eb,#60a5fa);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 5px 15px rgba(37,99,235,.4);margin-bottom:12px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Google Contacts Stilleri */
.gc-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:#dbeafe;color:#1e40af;margin:2px}
.gc-note{font-size:11px;color:var(--txt2);margin-top:6px;line-height:1.5;background:#f8fafc;padding:6px 10px;border-radius:6px;border-left:2px solid var(--acc)}
.gc-bday{font-size:11px;color:var(--grn);font-weight:600;margin-top:4px}
.gc-email{font-size:11px;color:var(--txt2);margin-top:2px}
.gc-discount{display:inline-flex;align-items:center;gap:4px;background:#fef3c7;color:#92400e;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
.google-connect-bar{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe;border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.google-connect-bar .gb-icon{width:36px;height:36px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.google-connect-bar .gb-info{flex:1;min-width:150px}
.google-connect-bar .gb-title{font-size:13px;font-weight:700;color:#1e40af}
.google-connect-bar .gb-sub{font-size:11px;color:#3b82f6;margin-top:1px}
.btn-google{background:#4285f4;color:#fff;border:none;border-radius:9px;padding:8px 16px;font:600 13px var(--fn);cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:background .15s}
.btn-google:hover{background:#3367d6}
.btn-google svg{flex-shrink:0}

</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
      <strong>The Creative Co.</strong>
      <em>Yönetici Girişi</em>
    </div>
    <div class="fg"><label>Kullanıcı Adı</label><input type="text" id="loginUser" placeholder="Kullanıcı adınız"/></div>
    <div class="fg"><label>Şifre</label><input type="password" id="loginPass" placeholder="Şifreniz" onkeypress="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn btn-p f-sub" onclick="doLogin()">Giriş Yap</button>
    <div id="loginError" style="color:var(--red);font-size:12px;margin-top:10px;text-align:center;display:none"></div>
  </div>
</div>

<div class="app" style="display:none" id="mainApp">
<div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<aside class="sb" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
    <div class="sb-logo-txt"><strong>The Creative Co.</strong><em>Yönetim Paneli</em></div>
  </div>
  
  <nav class="sb-nav">
    <button class="nav-item active" data-tab="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Ana Özet
    </button>
    <button class="nav-item" data-tab="sessions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Çekimler
    </button>
    <button class="nav-item" data-tab="clients">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="9" r="2.5"/><path d="M23 21v-1.5a3 3 0 0 0-3-3h-.5"/></svg>
      Müşteriler
    </button>
    <button class="nav-item" data-tab="client-auth">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      Müşteri Girişleri
    </button>
    
    <button class="nav-item" data-tab="panel-mgmt" style="background:rgba(255,255,255,0.05); color:#fff; border:1px solid rgba(255,255,255,0.1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      Panel Yönetimi
    </button>

    <button class="nav-item" data-tab="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Görevler
    </button>
    <button class="nav-item" data-tab="quotes" style="color:var(--grn)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Teklifler
    </button>
    <button class="nav-item" data-tab="contracts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Sözleşmeler

async function fbGetAll(col) { 
    try {

        const data = await res.json();
        return Array.isArray(data) ? data : [];
    } catch(e) { return []; } 
}

      obj._fbId = id; 
      await fetch(API_URL, {
          method: 'POST',

          body: JSON.stringify({ action: 'save', collection: col, id: id, data: obj })
      });

// BULK ACTIONS
window.toggleAllTrash = function(el) { document.querySelectorAll('.trash-item').forEach(c => c.checked = el.checked); }
window.restoreSelected = function() {
    const ids = Array.from(document.querySelectorAll('.trash-item:checked')).map(c => c.value);
    if(ids.length === 0) { showToast('Hiçbir kayıt seçilmedi', 'error'); return; }
    ids.forEach(id => restoreOne(id, false));
    showToast(`${ids.length} kayıt geri yüklendi`, 'success');
    render('trash');
}
window.restoreOne = async function(id, renderNow=true) {
    const item = trash.find(x => String(x.id) === String(id));
    if(!item) return;
    const col = item._origin;
    const restoredItem = { ...item };
    delete restoredItem._origin; delete restoredItem._deletedAt;
    eval(col).push(restoredItem);
    await persistOne(col, restoredItem, true);
    if(useFirebase && item._fbId) await fbDelete('trash', item._fbId);
    trash = trash.filter(x => String(x.id) !== String(id));
    if(!useFirebase) sv();
    if(renderNow) { showToast('Geri yüklendi', 'success'); render('trash'); }
}
window.askPermDelete = function() {
    const ids = Array.from(document.querySelectorAll('.trash-item:checked')).map(c => c.value);
    if(ids.length === 0) { showToast('Hiçbir kayıt seçilmedi', 'error'); return; }
    openMo('permDeleteAuth', ids.join(','));
}
window.checkPermDelete = async function() {
    const pass = v('pd_pass');
    if(pass !== '1453') { showToast('Hatalı Şifre!', 'error'); return; }
    const rawIds = document.getElementById('pd_ids').value;
    const ids = rawIds.split(',');
    for(const id of ids) {
        const item = trash.find(x => String(x.id) === String(id));
        if(item) {
            if(useFirebase && item._fbId) await fbDelete('trash', item._fbId);
            trash = trash.filter(x => String(x.id) !== String(id));
        }
    }
    if(!useFirebase) sv();
    closeModal(); showToast('Seçilenler kalıcı olarak silindi.', 'success'); render('trash');
}

window.del = async function(type, id) {
  if (type === 'client' && String(id).startsWith('gc_')) {
    if (!gcAccessToken) { showToast('Önce Google ile bağlanın', 'error'); return; }
    if (!confirm('Bu kişiyi Google Rehberinizden tamamen silmek istediğinize emin misiniz?')) return;
    const gcItem = gcContacts.find(x => x.id === String(id));
    if (gcItem) {
      showToast('Google\'dan siliniyor...', '');
      try {
        const res = await fetch(`https://people.googleapis.com/v1/${gcItem._resourceName}:deleteContact`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${gcAccessToken}` }});
        if (!res.ok) throw new Error('Google silme hatası');
        gcContacts = gcContacts.filter(x => x.id !== String(id));
        showToast('Google Kişiler\'den silindi ✓', 'success');
        renderClientGrid(document.getElementById('clientSearch')?.value || '');
      } catch(e) { showToast('Google\'dan silinemedi!', 'error'); }
    }
    return; 
  }

  const map={session:'sessions',client:'clients',task:'tasks',contract:'contracts',expense:'expenses',income:'incomes'};
  const col=map[type];
  const item=eval(col).find(x=>String(x.id)===String(id));
  if(!item) return;
  const trashItem = { ...item, _origin: col, _deletedAt: new Date().toISOString() };
  if(useFirebase) trashItem._fbId = null; 
  trash.push(trashItem);
  await persistOne('trash', trashItem, true);
  if(useFirebase && item._fbId) await fbDelete(col, item._fbId);
  eval(`${col}=${col}.filter(x=>String(x.id)!==String(id))`); 
  if(!useFirebase) sv(); 
  showToast('Çöp kutusuna taşındı', 'success');
  render(cur);
}

window.subSession = async function(id) {
  const safeId = (id && String(id) !== '0') ? String(id) : null;
  const cName = v('f_cname');
  if(!cName) { showToast('Müşteri adı gerekli!','error'); return; }
  const date = v('f_date'), total = Number(v('f_total')), paid = Number(v('f_paid')), desc = v('f_desc'), pkg = v('f_pkg');
  let cid;
  const existingClient = clients.find(c => c.name.toLowerCase() === cName.toLowerCase());
  
  if (existingClient) { 
      cid = existingClient.id;
      if(!safeId) {
         existingClient.total = (existingClient.total || 0) + total;
         existingClient.paid = (existingClient.paid || 0) + paid;
         await persistOne('clients', existingClient); 
      }
  } else {
    cid = String(uid());
    const newClient = { id: cid, name: cName, phone: v('f_cphone'), type: 'Genel', total: total, paid: paid };
    await persistOne('clients', newClient, true);
    clients.push(newClient);
  }

  const obj = {
    id: safeId || String(uid()), cid: cid, date: date, time: v('f_time'),
    total: total, paid: paid, pkg: pkg, loc: v('f_loc'), desc: desc, status: 'upcoming'
  };

  if(safeId){ 
      const i = sessions.findIndex(x => String(x.id) === safeId); 
      if(i !== -1) { 
          obj.status = sessions[i].status || 'upcoming'; 
          sessions[i] = {...sessions[i],...obj}; 
          await persistOne('sessions', sessions[i]); 
      }
  } else { 
    sessions.push(obj); await persistOne('sessions', obj, true); 
    if(paid > 0) {
      const inc = { id: String(uid()), date: date, desc: `${cName} - Kapora / Ön Ödeme`, amt: paid, store: 'corlu' }; 
      incomes.push(inc); await persistOne('incomes', inc, true);
    }
    // Excel ve Otomatik Sözleşme Yaratma Mantığı Kaldırıldı
    // Yeni eklenen çekimler otomatik olarak "Teklifler" sekmesine düşecek.
  }
  closeModal(); render(cur); 
}

window.subClient = async function(id) {
  const safeId = (id && String(id) !== '0') ? String(id) : null;
  const labelsRaw = v('f_labels');
  const gcLabels = labelsRaw ? labelsRaw.split(',').map(l => l.trim()).filter(Boolean) : [];

  const obj = {
    name: v('f_name'), phone: v('f_phone'), email: v('f_email'),
    birthday: v('f_birthday'), discount: v('f_discount'), notes: v('f_notes'), gcLabels
  };

  const isGoogleUpdate = safeId && safeId.startsWith('gc_');
  const isNewRecord = !safeId;

  if (gcAccessToken && (isGoogleUpdate || isNewRecord)) {
    showToast('Google Rehbere kaydediliyor...', '');
    try {
      let membershipArray = [];
      gcLabels.forEach(labelName => {
          let groupId = Object.keys(gcGroupMap).find(key => gcGroupMap[key].toLowerCase() === labelName.toLowerCase());
          if (groupId) membershipArray.push({ contactGroupMembership: { contactGroupResourceName: 'contactGroups/' + groupId } });
      });

      const personBody = {
        names: [{ givenName: obj.name }],
        phoneNumbers: obj.phone ? [{ value: obj.phone }] : [],
        emailAddresses: obj.email ? [{ value: obj.email }] : [],
        biographies: obj.notes || obj.discount ? [{ value: (obj.notes + (obj.discount ? ' | ' + obj.discount : '')).trim() }] : []
      };

      if (membershipArray.length > 0) personBody.memberships = membershipArray;
      
      let url = 'https://people.googleapis.com/v1/people:createContact';
      let method = 'POST';

      if (isGoogleUpdate) {
        const existingGc = gcContacts.find(c => c.id === safeId);
        if(existingGc) {
            personBody.etag = existingGc._etag; 
            url = `https://people.googleapis.com/v1/${existingGc._resourceName}:updateContact?updatePersonFields=names,phoneNumbers,emailAddresses,biographies,memberships`;
            method = 'PATCH';
        }
      }

      const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${gcAccessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify(personBody) });
      if(!res.ok) throw new Error('Google API Hatası');

      showToast('Google Kişiler güncellendi ✓', 'success'); closeModal(); await fetchGoogleContacts(null, true); return;
    } catch(e) { showToast('Google\'a kaydedilemedi!', 'error'); console.error(e); return; }
  }

  obj.id = safeId || String(uid());
  if (safeId && !safeId.startsWith('gc_')) {
    const i = clients.findIndex(x => String(x.id) === safeId);
    if(i !== -1) { clients[i] = {...clients[i], ...obj}; await persistOne('clients', clients[i]); }
  } else if(!safeId) { clients.push(obj); await persistOne('clients', obj, true); }
  closeModal(); render(cur); 
};

window.connectGoogleContacts = function() {
  if (!window.google) { showToast('Google GSI yüklenmedi, sayfayı yenileyin.', 'error'); return; }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: GOOGLE_SCOPES,
    callback: async (response) => {
      if (response.error) { showToast('Google bağlantısı başarısız: ' + response.error, 'error'); return; }
      gcAccessToken = response.access_token;
      localStorage.setItem('gc_token', gcAccessToken); 
      showToast('Google Bağlandı ✓', 'success');
      
      await fetchGoogleContacts();
    }
  });
  client.requestAccessToken();
};

window.fetchGoogleContacts = async function(pageToken = null, isAutoLoad = false) {
  if (!gcAccessToken) return;
  if(!pageToken && !isAutoLoad) showToast('Google Kişileriniz yükleniyor...', '');
  try {
    if (Object.keys(gcGroupMap).length === 0) {
        const grpRes = await fetch('https://people.googleapis.com/v1/contactGroups', { headers: { Authorization: `Bearer ${gcAccessToken}` } });
        if (grpRes.ok) {
            const grpData = await grpRes.json();
            (grpData.contactGroups || []).forEach(g => {
                const gId = (g.resourceName || '').replace('contactGroups/', '');
                gcGroupMap[gId] = g.formattedName || g.name;
            });
        }
    }

    let url = `https://people.googleapis.com/v1/people/me/connections?personFields=names,phoneNumbers,emailAddresses,birthdays,biographies,memberships,photos&pageSize=200` + (pageToken ? `&pageToken=${pageToken}` : '');
    const resp = await fetch(url, { headers: { Authorization: `Bearer ${gcAccessToken}` } });
    if (!resp.ok) {
      if (resp.status === 401) {
        gcAccessToken = null; localStorage.removeItem('gc_token');
        if(!isAutoLoad) showToast('Oturum süresi doldu, tekrar bağlanın.', 'error');
        renderClientGrid(document.getElementById('clientSearch')?.value || ''); 
        return;
      }
      throw new Error('API Hatası: ' + resp.status);
    }
    
    const data = await resp.json();
    const newContacts = (data.connections || []).map(parseGContact).filter(c => c.name);
    
    if (!pageToken) gcContacts = [];
    gcContacts = [...gcContacts, ...newContacts];
    
    if (data.nextPageToken) { await fetchGoogleContacts(data.nextPageToken, isAutoLoad); } 
    else {
      if(!isAutoLoad) showToast(`${gcContacts.length} kişi Google'dan eklendi`, 'success');
      renderClientGrid(document.getElementById('clientSearch')?.value || '');
    }
  } catch(e) { if(!isAutoLoad) showToast('Hata: ' + e.message, 'error'); }
};

function parseGContact(person) {
  const name = (person.names?.[0]?.displayName) || '';
  const phone = (person.phoneNumbers?.[0]?.canonicalForm || person.phoneNumbers?.[0]?.value || '');
  const email = person.emailAddresses?.[0]?.value || '';
  let birthday = '';
  const bd = person.birthdays?.[0]?.date;
  if (bd) {
    const months = ['','Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    birthday = `${bd.day || ''} ${months[bd.month] || ''} ${bd.year || ''}`.trim();
  }
  const notes = person.biographies?.[0]?.value || '';
  const labels = (person.memberships || []).map(m => {
        const gId = (m.contactGroupMembership?.contactGroupId || '').replace('contactGroups/', '');
        return gcGroupMap[gId] || gId; 
    }).filter(l => l && l !== 'myContacts'); 
  const discountMatch = notes.match(/(%\d+|₺\d+[\s]?indirim|\d+%)/i);
  const discount = discountMatch ? discountMatch[0] : '';
  let photoUrl = '';
  if (person.photos && person.photos[0] && !person.photos[0].default) { photoUrl = person.photos[0].url; }
  
  return {
    id: 'gc_' + (person.resourceName || '').replace('people/', ''),
    _resourceName: person.resourceName, _etag: person.etag,
    name, phone, email, birthday, notes, gcLabels: labels, discount, photoUrl, type: 'Google Contacts', _fromGoogle: true
  };
}


function rQuotes() {
    // Sözleşmesi olmayan çekimleri Teklifler sekmesinde listeleriz
    const pendingQuotes = sessions.filter(s => !contracts.some(c => c.cid === s.cid && c.date === s.date));

    return `
    <div class="ph"><h2>📑 Bekleyen Teklifler</h2></div>
    <div class="card card-p"><div class="tbl-wrap"><table><thead><tr><th>Çekim Kodu</th><th>Müşteri Bilgisi</th><th>Etkinlik & Konum</th><th>Tarih / Saat</th><th>İşlem</th></tr></thead>
    <tbody>
        ${pendingQuotes.length === 0 ? '<tr><td colspan="5" style="text-align:center;color:var(--txt3);padding:20px">Sözleşmeye dönüştürülmeyi bekleyen teklif/çekim bulunmuyor.</td></tr>' :
        pendingQuotes.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(q => `<tr><td style="font-weight:700; color:var(--acc)">#${String(q.id).slice(-6)}</td><td><div style="font-weight:600">${cn(q.cid)}</div><div style="font-size:11px;color:var(--txt2)">${cp(q.cid) || 'Tel Yok'}</div></td><td><div>${q.pkg || 'Belirtilmemiş'}</div><div style="font-size:11px;color:var(--txt2)">${q.loc || '-'}</div></td><td><span class="badge b-pending">${fmtDate(q.date)} - ${q.time || ''}</span></td><td><button class="btn btn-e btn-sm" onclick="openMo('quoteDetail', '${q.id}')">${I.eye} Detay & Dönüştür</button></td></tr>`).join('')}
    </tbody></table></div></div>`;
}

window.convertQuoteToContract = async function(id) {
    const sess = sessions.find(x => String(x.id) === String(id));
    if(!sess) return;

    const cont = {
        id: String(uid()), cid: sess.cid, date: sess.date, total: sess.total, paid: sess.paid, status: 'pending',
        terms: `Hizmet: ${sess.pkg || ''}\nLokasyon: ${sess.loc || ''}\nTarih/Saat: ${fmtDate(sess.date)} ${sess.time || ''}\nNotlar: ${sess.desc || ''}`
    };
    
    contracts.push(cont); 
    await persistOne('contracts', cont, true);

    closeModal(); 
    showToast('Teklif Sözleşmeye Dönüştürüldü!', 'success'); 
    go('contracts'); 
};


function renderClientGrid(query = '') {
    const grid = document.getElementById('clientGrid');
    if (!grid) return;
    query = query.toLowerCase();
    
    let mergedContacts = [...clients, ...gcContacts];
    
    let filtered = mergedContacts.sort((a, b) => a.name.localeCompare(b.name, 'tr'));
    if (query) filtered = filtered.filter(c => (c.name && c.name.toLowerCase().includes(query)) || (c.phone && c.phone.includes(query)) );
    
    const countSpan = document.getElementById('totalClientCount');
    if(countSpan) countSpan.textContent = filtered.length;
    
    const showList = filtered.slice(0, renderLimit);
    grid.innerHTML = showList.map(c => `
      <div class="card cl-card">
        <div class="cl-head">
          ${c.photoUrl ? `<img src="${c.photoUrl}" style="width:43px;height:43px;border-radius:12px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 5px rgba(0,0,0,0.08)" alt="${c.name}"/>` : `<div class="cl-ava" style="background:${getRandomColor(c.name)}">${c.name.charAt(0).toUpperCase()}</div>`}
          <div style="flex:1; margin-left:12px; overflow:hidden">
            <div style="font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis">${c.name} ${c.type === 'Google Contacts' ? '<span style="font-size:9px;background:#e8f0fe;color:#1a73e8;padding:1px 5px;border-radius:8px;margin-left:5px;font-weight:600" title="Google Contacts">G</span>' : ''}</div>
            <div style="font-size:12px; color:var(--txt2)">${c.phone || 'Tel yok'}</div>
            ${c.email ? `<div style="font-size:11px; color:var(--txt3)">${c.email}</div>` : ''}
            ${c.birthday ? `<div class="gc-bday">🎂 ${c.birthday}</div>` : ''}
            ${c.discount ? `<div class="gc-discount">🏷️ ${c.discount}</div>` : ''}
            ${c.notes ? `<div class="gc-note" style="margin-top:5px">${c.notes.length > 70 ? c.notes.substring(0,70)+'…' : c.notes}</div>` : ''}
            ${c.gcLabels && c.gcLabels.length > 0 ? `<div class="tags" style="margin-top:5px">${c.gcLabels.map(l => `<span class="gc-tag">${l}</span>`).join('')}</div>` : ''}
          </div>
          <div style="display:flex; gap:5px; flex-shrink:0; align-items:flex-start;"><button class="btn btn-e btn-sm" onclick="openMo('client','${c.id}')">${I.edit}</button><button class="btn btn-d btn-sm" onclick="del('client','${c.id}')">${I.trash}</button></div>
        </div>
      </div>
    `).join('');
    
    const loadBtn = document.getElementById('loadMoreBtn');
    if(loadBtn) loadBtn.style.display = (filtered.length > renderLimit) ? 'block' : 'none';
}

window.renderAuthGrid = function(query = '') {
    const tbody = document.getElementById('authTableBody');
    if(!tbody) return;
    query = query.toLowerCase();
    let mergedContacts = [...clients];
    gcContacts.forEach(gc => {
        const alreadyExists = mergedContacts.some(c => c.name.toLowerCase() === gc.name.toLowerCase() || (gc.phone && c.phone === gc.phone) );
        if (!alreadyExists) mergedContacts.push(gc);
    });
    let filtered = mergedContacts.filter(c => c.name.toLowerCase().includes(query)).sort((a,b) => a.name.localeCompare(b.name, 'tr'));
    const showList = filtered.slice(0, authLimit);
    tbody.innerHTML = showList.map(c => `<tr><td style="font-weight:600">${c.name} ${c.type === 'Google Contacts' ? '<span style="font-size:9px;background:#e8f0fe;color:#1a73e8;padding:1px 5px;border-radius:8px;margin-left:5px;font-weight:600" title="Google Contacts">G</span>' : ''}</td><td>${c.username || '<em style="color:#94a3b8">Yok</em>'}</td><td>${c.username ? '<span class="badge b-active">Aktif</span>' : '<span class="badge b-pending">Pasif</span>'}</td><td><button class="btn btn-e btn-sm" onclick="openMo('auth','${c.id}')">${I.key} Düzenle</button></td></tr>`).join('');
    const btn = document.getElementById('authLoadMoreBtn');
    if(btn) btn.style.display = (filtered.length > authLimit) ? 'block' : 'none';
}
window.loadMoreAuth = function() { authLimit += 50; renderAuthGrid(document.getElementById('authSearch').value); }
window.loadMoreClients = function() { renderLimit += 50; renderClientGrid(document.getElementById('clientSearch').value); }
function getRandomColor(name) { const colors = ['#eff6ff', '#f0fdf4', '#fef2f2', '#fffbeb', '#f5f3ff']; let hash = 0; for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash); return colors[Math.abs(hash) % colors.length]; }

window.renderClientGrid = renderClientGrid;

window.updateAdminPassword = async function() {
  const oldP = v('prof_old_pass'), newP = v('prof_new_pass'), newP2 = v('prof_new_pass2');
  let dbUser = adminUsers.find(u => u.username === currentUser.username);
  if (!dbUser || dbUser.pass !== oldP) { showToast('Mevcut şifreniz hatalı!', 'error'); return; }
  if (newP !== newP2) { showToast('Yeni şifreler birbiriyle eşleşmiyor!', 'error'); return; }
  if (newP.length < 5) { showToast('Yeni şifre en az 5 karakter olmalı!', 'error'); return; }
  dbUser.pass = newP; await fbUpdate('users', dbUser);
  showToast('Şifreniz başarıyla değiştirildi ✓', 'success'); closeModal();
}

window.subTask = async function(id) {
    const safeId = (id && String(id) !== '0') ? String(id) : null;
    const obj = { id: safeId || String(uid()), title: v('f_title'), desc: v('f_desc'), due: v('f_due'), status: v('f_stat') || 'todo' };

    else { tasks.push(obj); }

}

window.subExpInc = async function(col, id) {
    const safeId = (id && String(id) !== '0') ? String(id) : null;
    
    const date = v('f_date');
    const desc = v('f_desc');
    const amt = Number(v('f_amt'));
    const store = v('f_store') || 'corlu';

    const obj = { id: safeId || String(uid()), date: date, desc: desc, amt: amt, store: store };
    
    // Müşteri ve İşlem seçimi yakalama (Sadece yeni gelir eklerken var)
    const cSel = document.getElementById('f_inc_client');
    const sSel = document.getElementById('f_inc_session');
    const cid = cSel ? cSel.value : null;
    const sid = sSel ? sSel.value : null;

    const targetArr = col === 'incomes' ? incomes : expenses;
    if (safeId) { 
        const i = targetArr.findIndex(x => String(x.id) === safeId); 
        if (i !== -1) targetArr[i] = { ...targetArr[i], ...obj }; 
    } else { 
        if (cid) obj.cid = cid;
        targetArr.push(obj); 
    }
    
    await persistOne(col, obj, !safeId); 

    // EĞER YENİ BİR GELİRSE VE MÜŞTERİ SEÇİLMİŞSE BAKİYELERİ OTOMATİK DÜŞ
    if (col === 'incomes' && !safeId && cid) {
        // 1. Müşteri Genel Ödenen (Paid) Bakiyesini Güncelle
        const client = clients.find(c => String(c.id) === String(cid));
        if (client) {
            client.paid = (Number(client.paid) || 0) + amt;
            await persistOne('clients', client);
        }

        // 2. Çekim (Session) ve Sözleşme Bakiyesini Güncelle
        let sessionToUpdate = null;
        if (sid) {
            sessionToUpdate = sessions.find(s => String(s.id) === String(sid));
        } else {
            sessionToUpdate = sessions.find(s => String(s.cid) === String(cid)); // Spesifik seçilmediyse ilkini bul
        }

        if (sessionToUpdate) {
            sessionToUpdate.paid = (Number(sessionToUpdate.paid) || 0) + amt;
            await persistOne('sessions', sessionToUpdate);

            // İlgili sözleşmeyi de bul ve güncelle
            const contract = contracts.find(c => String(c.cid) === String(cid) && c.date === sessionToUpdate.date);
            if (contract) {
                contract.paid = (Number(contract.paid) || 0) + amt;
                await persistOne('contracts', contract);
            } else {
                 const anyContract = contracts.find(c => String(c.cid) === String(cid));
                 if(anyContract) {
                     anyContract.paid = (Number(anyContract.paid) || 0) + amt;
                     await persistOne('contracts', anyContract);
                 }
            }
        }
    }

    closeModal(); 
    if (cid && col === 'incomes' && !safeId) {
        showToast('Tahsilat eklendi ve müşteri borcundan düşüldü ✓', 'success');
    } else {
        showToast('Kaydedildi ✓', 'success');
    }
    render(cur);
}
window.handleAvatarUpload = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = async function() {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 150; let width = img.width; let height = img.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
            const base64Avatar = canvas.toDataURL('image/jpeg', 0.8);
            
            document.getElementById('profModalAvatar').innerHTML = `<img src="${base64Avatar}"/>`;
            updateHeaderAvatar(base64Avatar, currentUser.name);
            
            currentUser.avatar = base64Avatar; localStorage.setItem('pf_currentUser', JSON.stringify(currentUser));
            let dbUser = adminUsers.find(u => u.username === currentUser.username);
            if (dbUser) { dbUser.avatar = base64Avatar; await fbUpdate('users', dbUser); showToast('Profil fotoğrafı güncellendi ✓', 'success'); }
        }
        img.src = e.target.result;
    }
    reader.readAsDataURL(file);
}

window.updateHeaderAvatar = function(avatarUrl, name) {
    const hdrAv = document.getElementById('headerAvatar');
    if(hdrAv) {
        if(avatarUrl) { hdrAv.innerHTML = `<img src="${avatarUrl}"/>`; } 
        else { hdrAv.innerHTML = name ? name.charAt(0).toUpperCase() : 'F'; }
    }
}

window.loadClientSessionsForIncome = function(cid) {
    const wrap = document.getElementById('f_inc_session_wrap');
    const sel = document.getElementById('f_inc_session');
    
    if (!cid) { 
        wrap.style.display = 'none'; sel.innerHTML = ''; 
        autoFillIncomeDesc(); return; 
    }
    
    const clientSessions = sessions.filter(s => String(s.cid) === String(cid));
    if (clientSessions.length === 0) {
        wrap.style.display = 'none'; sel.innerHTML = ''; 
        autoFillIncomeDesc(); return;
    }
    
    wrap.style.display = 'block';
    sel.innerHTML = '<option value="">-- Tüm İşlemlere Say (Genel) --</option>' + clientSessions.map(s => {
        const debt = Number(s.total) - Number(s.paid);
        return `<option value="${s.id}" data-pkg="${s.pkg}">Tarih: ${fmtDate(s.date)} | ${s.pkg} (Kalan: ₺${debt})</option>`;
    }).join('');
    
    autoFillIncomeDesc();
}

window.autoFillIncomeDesc = function() {
    const cSel = document.getElementById('f_inc_client');
    const sSel = document.getElementById('f_inc_session');
    const descInput = document.getElementById('f_desc');
    
    if (!cSel || !cSel.value) {
        descInput.value = '';
        return;
    }
    
    const clientText = cSel.options[cSel.selectedIndex].text; // Örn: Ali Veli (05...)
    let desc = `${clientText} - Ara Ödeme / Tahsilat`;
    
    if (sSel && sSel.value) {
        const pkg = sSel.options[sSel.selectedIndex].getAttribute('data-pkg');
        desc = `${clientText} - ${pkg} Ödemesi`;
    }
    
    descInput.value = desc;
}

  initFirebase();
